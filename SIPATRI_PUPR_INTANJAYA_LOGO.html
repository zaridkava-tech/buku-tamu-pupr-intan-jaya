<div id="clock"></div>
</div>
</header>

<div class="max-w-7xl mx-auto p-4">
<div class="grid md:grid-cols-4 gap-4 mb-4">
<div class="bg-white p-4 rounded-xl shadow"><b>Total Tamu</b><h2 id="total" class="text-3xl">0</h2></div>
<div class="bg-white p-4 rounded-xl shadow"><b>Hari Ini</b><h2 id="hari" class="text-3xl">0</h2></div>
<div class="bg-white p-4 rounded-xl shadow"><b>Bulan Ini</b><h2 id="bulan" class="text-3xl">0</h2></div>
<div class="bg-white p-4 rounded-xl shadow"><b>Tahun Ini</b><h2 id="tahun" class="text-3xl">0</h2></div>
</div>

<div class="grid lg:grid-cols-3 gap-4">
<div class="bg-white p-4 rounded-xl shadow">
<h3 class="font-bold mb-3">Registrasi Tamu</h3>
<form id="f">
<input id="nama" class="border p-2 w-full mb-2" placeholder="Nama Lengkap" required>
<input id="nik" class="border p-2 w-full mb-2" placeholder="NIK">
<input id="instansi" class="border p-2 w-full mb-2" placeholder="Instansi">
<input id="jabatan" class="border p-2 w-full mb-2" placeholder="Jabatan">
<input id="wa" class="border p-2 w-full mb-2" placeholder="WhatsApp">
<select id="tujuan" class="border p-2 w-full mb-2">
<option>Kepala Dinas</option><option>Sekretariat</option>
<option>Bina Marga</option><option>Cipta Karya</option>
<option>SDA</option><option>Tata Ruang</option>
</select>
<textarea id="kep" class="border p-2 w-full mb-2" placeholder="Keperluan"></textarea>
<button class="bg-yellow-400 w-full p-2 rounded font-bold">Simpan</button>
</form>
</div>

<div class="lg:col-span-2 bg-white p-4 rounded-xl shadow">
<div class="flex justify-between mb-3">
<input id="cari" onkeyup="render()" class="border p-2" placeholder="Cari tamu">
<div>
<button onclick="ekspor()" class="bg-green-600 text-white px-3 py-2 rounded">CSV</button>
<button onclick="window.print()" class="bg-blue-900 text-white px-3 py-2 rounded">Cetak</button>
</div>
</div>
<table class="w-full border">
<thead><tr class="bg-slate-200">
<th>Nama</th><th>Instansi</th><th>WA</th><th>Tujuan</th><th>Keperluan</th>
</tr></thead>
<tbody id="tb"></tbody>
</table>
<canvas id="grafik" class="mt-4"></canvas>
</div>
</div>
</div>

<script>
let data=JSON.parse(localStorage.getItem('sipatri')||'[]');
setInterval(()=>clock.innerText=new Date().toLocaleString('id-ID'),1000);

f.onsubmit=(e)=>{
e.preventDefault();
data.unshift({
nama:nama.value,nik:nik.value,instansi:instansi.value,jabatan:jabatan.value,
wa:wa.value,tujuan:tujuan.value,kep:kep.value,tgl:new Date().toISOString()
});
localStorage.setItem('sipatri',JSON.stringify(data));
f.reset();render();
};

function render(){
let q=(cari.value||'').toLowerCase();
tb.innerHTML='';
data.filter(x=>x.nama.toLowerCase().includes(q)||x.instansi.toLowerCase().includes(q))
.forEach(x=>tb.innerHTML+=`<tr><td>${x.nama}</td><td>${x.instansi}</td><td>${x.wa}</td><td>${x.tujuan}</td><td>${x.kep}</td></tr>`);
total.innerText=data.length;hari.innerText=data.length;bulan.innerText=data.length;tahun.innerText=data.length;
gambar();
}

function ekspor(){
let csv="Nama,Instansi,WA,Tujuan,Keperluan\n";
data.forEach(x=>csv+=`${x.nama},${x.instansi},${x.wa},${x.tujuan},${x.kep}\n`);
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));
a.download='Buku_Tamu_PUPR.csv';a.click();
}

let c;
function gambar(){
if(c)c.destroy();
c=new Chart(grafik,{type:'bar',data:{labels:['Kunjungan'],datasets:[{data:[data.length]}]}});
}
render();
</script>
</body></html>
